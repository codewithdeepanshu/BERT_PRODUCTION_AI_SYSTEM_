version: "3.9"

services:
  api:
    build: .
    container_name: bert_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env

  ui:
    build: .
    container_name: bert_ui
    command: streamlit run ui/Home.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
